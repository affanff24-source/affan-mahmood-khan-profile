<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affan's Profile Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0d1117;
            overflow: hidden;
        }

        .card {
            position: relative;
            width: 350px;
            height: 450px;
            background: rgba(22, 27, 34, 0.8);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.2);
            transition: 0.5s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 50px rgba(0, 242, 254, 0.5);
            border: 1px solid rgba(0, 242, 254, 0.5);
        }

        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 100%;
            height: 100%;
            background: linear-gradient(0deg, transparent, #00f2fe, #00f2fe);
            transform-origin: bottom right;
            animation: animate 6s linear infinite;
        }

        .card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 100%;
            height: 100%;
            background: linear-gradient(0deg, transparent, #4facfe, #4facfe);
            transform-origin: bottom right;
            animation: animate 6s linear infinite;
            animation-delay: -3s;
        }

        @keyframes animate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .content {
            position: absolute;
            inset: 4px;
            background: #0d1117;
            border-radius: 16px;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 25px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #00f2fe;
            box-shadow: 0 0 20px #00f2fe;
            margin-bottom: 20px;
            object-fit: cover;
        }

        h2 {
            color: #fff;
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        span {
            color: #00f2fe;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        p {
            color: #8b949e;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .btn {
            padding: 10px 25px;
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            border: none;
            border-radius: 25px;
            color: #fff;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 5px 15px rgba(0, 242, 254, 0.3);
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 25px rgba(0, 242, 254, 0.6);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="content">
            <!-- You can change the image URL inside src="" to your own photo later! -->
            <img class="avatar" src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=500" alt="Profile Picture">
            <h2>Affan Mahmood Khan</h2>
            <span>Web Developer</span>
            <p>Welcome to my official profile card. I design glowing modern user interfaces and bring websites to life using code.</p>
            <a href="#" class="btn">Contact Me</a>
        </div>
    </div>

</body>
</html>
