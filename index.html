<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Affan's Profile Card</title>
  
  <!-- This pulls the premium Montserrat font from Google -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    /* 1. RESET STYLES */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Montserrat', sans-serif;
    }

    /* 2. BACKGROUND STYLES */
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* 3. THE GLASS CARD */
    .fan-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      width: 100%;
      max-width: 380px;
      padding: 35px 25px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    /* 4. GLOWING AVATAR */
    .avatar {
      width: 95px;
      height: 95px;
      border-radius: 50%;
      background: linear-gradient(45deg, #00f2fe, #4facfe); /* Neon blue gradient */
      margin: 0 auto 20px auto;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 2.2rem;
      box-shadow: 0 0 25px rgba(0, 242, 254, 0.5); /* Makes the circle glow! */
    }

    /* 5. TEXT STYLES */
    .fan-card h2 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }

    .fan-card .badge {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #00f2fe; /* Glowing neon blue text */
      font-weight: 700;
      margin-bottom: 20px;
      display: inline-block;
    }

    .fan-card p {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #94a3b8;
      margin-bottom: 28px;
    }

    /* 6. MODERN BUTTONS */
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-primary {
      background: #ffffff;
      color: #0f172a;
      margin-bottom: 12px;
      box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body>

  <!-- Your Finished Premium Card -->
  <div class="fan-card">
    
    <!-- Rocket Avatar -->
    <div class="avatar">🚀</div>
    
    <!-- Your Info -->
    <h2>Affan Mahmood Khan</h2>
    <span class="badge">Class 7N • Central School</span>
    
    <!-- Your Awesome Description -->
    <p>Welcome to my official profile page! I am a student at Central School learning how to build clean, modern user interfaces with HTML and CSS.</p>
    
    <!-- Interactive Buttons -->
    <button class="btn btn-primary">Follow Affan</button>
    <button class="btn btn-secondary">Send Message</button>
    
  </div>

</body>
</html>
